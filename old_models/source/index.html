<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front real python</title>
</head>

<body>
    <h2>Add a new country</h2>
    <form id="countryForm">
        <div class="form-group">
            <label for="name">Name of the country:</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label for="capital">Capital:</label>
            <input type="text" id="capital" required>
        </div>
        <div class="form-group">
            <label for="area">Area (km²):</label>
            <input type="number" id="area" required>
        </div>
        <button type="submit">Send country</button>
    </form>
</body>

</html>
